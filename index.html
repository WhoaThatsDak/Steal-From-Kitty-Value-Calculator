<!DOCTYPE html>
<html>
<head>
  <title>Project Data</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    table {
      border-collapse: collapse;
      background: white;
    }
    td, th {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background: black;
      color: white;
    }
  </style>
</head>
<body>

<h2>Project Data</h2>
<table id="sheetTable"></table>

<script>
fetch("https://script.google.com/macros/s/AKfycby802qvo00B4Mw5dHXFQWqon3IZvDxdgGeWamfY1OQwpOXm5QMiGE0WumXWBB1A8xSA/exec")
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById("sheetTable");

    data.forEach((row, i) => {
      let tr = document.createElement("tr");

      row.forEach(cell => {
        let el = document.createElement(i === 0 ? "th" : "td");
        el.textContent = cell;
        tr.appendChild(el);
      });

      table.appendChild(tr);
    });
  });
</script>

</body>
</html>
