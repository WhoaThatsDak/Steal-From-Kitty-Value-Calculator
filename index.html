<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Interactive Kitty Value Calculator</title>
  <style>
    body {
      margin: 0;

      min-height: 100vh;

      text-align: center;
    }

<body>

  <h1>Interactive Kitty Value Calculator</h1>

  <iframe

    frameborder="0">

</html>
