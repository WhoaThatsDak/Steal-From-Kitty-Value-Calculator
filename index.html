<!DOCTYPE html>
<html>
<head>
  <title>Kitty Value Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
    }

    .message {
      font-size: 20px;
      margin-bottom: 20px;
    }
  </style>

  <script>
    // Replace with your sheet's copy URL
    const copyURL = "https://docs.google.com/spreadsheets/d/1O4Aqnb_BJFDJEwhR_nWNIuosLbPODlPekrx42LejTSo/copy";

    // Redirect to personal copy immediately
    window.onload = () => {
      // Optional: show a message for 1 second before redirect
      document.getElementById("msg").innerText = "Opening your personal copy...";
      setTimeout(() => {
        window.location.href = copyURL;
      }, 500); // 0.5 seconds
    }
  </script>
</head>
<body>
  <div class="message" id="msg">
    Preparing your personal copy...
  </div>
</body>
</html>
